<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1d4ed8"/>
  <!-- Back session card -->
  <rect x="34" y="24" width="72" height="52" rx="7" fill="white" fill-opacity="0.2"/>
  <!-- Middle session card -->
  <rect x="27" y="34" width="72" height="52" rx="7" fill="white" fill-opacity="0.4"/>
  <!-- Front browser card -->
  <rect x="20" y="44" width="72" height="52" rx="7" fill="white"/>
  <!-- Tab notch on front card -->
  <rect x="20" y="32" width="30" height="14" rx="5" fill="white"/>
  <!-- Separator line -->
  <rect x="20" y="56" width="72" height="2" fill="#1d4ed8" fill-opacity="0.08"/>
  <!-- Content lines -->
  <rect x="28" y="64" width="48" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="28" y="76" width="36" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="28" y="88" width="42" height="5" rx="2.5" fill="#bfdbfe"/>
</svg>

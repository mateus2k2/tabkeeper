<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="9" fill="#1d4ed8"/>
  <!-- Back session card -->
  <rect x="13" y="9" width="27" height="20" rx="3" fill="white" fill-opacity="0.2"/>
  <!-- Middle session card -->
  <rect x="10" y="13" width="27" height="20" rx="3" fill="white" fill-opacity="0.4"/>
  <!-- Front browser card -->
  <rect x="7" y="17" width="27" height="20" rx="3" fill="white"/>
  <!-- Tab notch on front card -->
  <rect x="7" y="12" width="11" height="7" rx="2" fill="white"/>
  <!-- Separator line -->
  <rect x="7" y="22" width="27" height="1" fill="#1d4ed8" fill-opacity="0.08"/>
  <!-- Content lines -->
  <rect x="10" y="25" width="18" height="2" rx="1" fill="#bfdbfe"/>
  <rect x="10" y="29" width="13" height="2" rx="1" fill="#bfdbfe"/>
  <rect x="10" y="33" width="16" height="2" rx="1" fill="#bfdbfe"/>
</svg>
